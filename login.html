<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>茄子数据</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.95);border-radius:20px;padding:45px 40px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:420px;width:100%;text-align:center}
.card h1{font-size:32px;color:#333;margin-bottom:5px}.card .subtitle{color:#999;margin-bottom:25px;font-size:14px}
.tabs{display:flex;margin-bottom:25px;border-bottom:2px solid #eee}.tab{flex:1;text-align:center;padding:12px;cursor:pointer;color:#999;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#667eea;border-bottom-color:#667eea}
.form{display:none}.form.active{display:block}.input-group{margin-bottom:18px;text-align:left}.input-group label{display:block;font-size:13px;color:#555;margin-bottom:5px}
.input-group input{width:100%;padding:12px 14px;border:2px solid #eee;border-radius:10px;font-size:15px;outline:none}
.input-group input:focus{border-color:#667eea}
.btn{width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
.btn:hover{background:#5a6fd6}
.msg{font-size:13px;margin-top:10px;display:none;padding:8px 12px;border-radius:6px;color:#c0392b;background:#fdecea}
</style></head><body>
<div class="card"><h1>🍆 茄子数据</h1><p class="subtitle">文件管理服务 v2.1</p>
<div class="tabs"><div class="tab active" onclick="switchTab('login')">登录</div><div class="tab" onclick="switchTab('register')">注册</div></div>
<div class="form active" id="loginForm"><form method="post" action="/login">
<div class="input-group"><label>用户名</label><input type="text" name="username" placeholder="输入用户名" required autofocus></div>
<div class="input-group"><label>密码</label><input type="password" name="password" placeholder="输入密码" required></div>
<button class="btn" type="submit">登 录</button></form><div class="msg" id="loginError">用户名或密码错误</div></div>
<div class="form" id="registerForm"><form method="post" action="/register" onsubmit="return validateRegister()">
<div class="input-group"><label>用户名</label><input type="text" name="username" id="regUser" placeholder="2-20位字母数字" required minlength="2" maxlength="20" pattern="^[a-zA-Z0-9_]+$"></div>
<div class="input-group"><label>显示名称（可选）</label><input type="text" name="display_name" id="regDisplay" placeholder="别人看到的名字" maxlength="30"></div>
<div class="input-group"><label>密码</label><input type="password" name="password" id="regPass" placeholder="至少4位" required minlength="4"></div>
<div class="input-group"><label>确认密码</label><input type="password" name="password2" id="regPass2" placeholder="再次输入" required></div>
<button class="btn" type="submit">注 册</button></form><div class="msg" id="regError"></div></div></div>
<script>
var p=new URLSearchParams(window.location.search);if(p.get('error')==='1')document.getElementById('loginError').style.display='block'
if(p.get('registered')==='1'){document.getElementById('loginError').textContent='注册成功，请登录';document.getElementById('loginError').className='msg';document.getElementById('loginError').style.display='block';document.getElementById('loginError').style.color='#27ae60';document.getElementById('loginError').style.background='#eafaf1'}
function switchTab(n){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.form').forEach(function(f){f.classList.remove('active')});if(n==='login'){document.querySelector('.tab:first-child').classList.add('active');document.getElementById('loginForm').classList.add('active')}else{document.querySelector('.tab:last-child').classList.add('active');document.getElementById('registerForm').classList.add('active')}}
function validateRegister(){var p1=document.getElementById('regPass').value,p2=document.getElementById('regPass2').value,err=document.getElementById('regError');if(p1!==p2){err.textContent='两次密码不一致';err.style.display='block';return false}return true}
</script></body></html>
